<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ROSALEIGH – a heritage of purity. Luxury skincare launching soon. Be the first to experience timeless elegance.">
    <title>ROSALEIGH | Launching Soon</title>

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="bg.jpeg" fetchpriority="high">
    <link rel="preload" as="image" href="image.png" fetchpriority="high">

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Optimized font loading: only load essential families, use swap -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Playfair+Display:wght@700&family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Special+Elite&family=Orbitron:wght@700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Playfair+Display:wght@700&family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Special+Elite&family=Orbitron:wght@700&display=swap" rel="stylesheet"></noscript>

    <style>
        /* Critical CSS inlined – same as before, but with image dimensions */
        :root { --gold: #C9A77E; --cream: #EDE6D9; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; }

        body {
            height:100vh; width:100vw;
            background:#000; color:#fff;
            font-family:'Cormorant Garamond',serif;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            text-align:center; overflow:hidden; position:relative;
        }

        .bg {
            position:fixed; inset:0;
            background-color: #1a1a1a;
            background-image: url('bg.jpeg');
            background-position:center center;
            background-size:cover; 
            background-repeat:no-repeat;
            filter:blur(8px) brightness(0.45) saturate(0.8);
            transform:scale(1.0);
            z-index:0;
        }

        .overlay {
            position:fixed; inset:0;
            background:radial-gradient(ellipse at center,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.5) 100%);
            z-index:1;
        }

        .content {
            position:relative; z-index:2;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            width:100%; height:100%;
            padding:0 30px 80px;
        }

        .logo { width:220px; max-width:75vw; margin-bottom:26px; }
        .logo img { width:100%; height:auto; display:block; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.95)); }

        .brand {
            font-size:clamp(40px,7vw,82px);
            font-weight:300; letter-spacing:0.20em;
            margin-bottom:10px; color:var(--cream);
            text-shadow:0 2px 12px rgba(0,0,0,0.85);
        }

        .heritage {
            font-size:clamp(16px, 2.2vw, 22px);
            letter-spacing:0.8em;
            text-transform:uppercase; 
            margin-bottom:48px; 
            color:var(--gold);
            font-weight: 400;
            white-space: nowrap;
        }

        .launching-container {
            height:160px; 
            position:relative;
            width:100%; 
            display:flex;
            align-items:center; 
            justify-content:center;
            margin-top: 10px;
        }

        .launching {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            white-space:nowrap; 
            line-height:1;
            opacity:0; visibility:hidden;
            transition:opacity 0.6s ease;
            text-align:center;
            padding: 0 20px;
        }
        .launching.active {
            opacity:1; visibility:visible;
        }

        /* Font styles */
        #l1 { font-family:'Great Vibes',cursive; font-size:clamp(48px,7.8vw,94px); color:var(--cream); }
        #l2 { font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(39px,6.8vw,74px); color:#f5e6cc; letter-spacing:0.12em; }
        #l3 { font-family:'Dancing Script',cursive; font-weight:700; font-size:clamp(46px,7.6vw,88px); color:#EDE6D9; }
        #l4 { font-family:'Dancing Script',cursive; font-size:clamp(44px,7.3vw,84px); color:#ffffff; }
        #l5 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:clamp(37px,6.4vw,72px); color:rgba(200,230,255,0.95); letter-spacing:0.18em; text-shadow:0 0 16px rgba(180,220,255,0.65); }
        #l6 { font-family:'Great Vibes',cursive; font-size:clamp(48px,7.8vw,92px); color:#fff; }
        #l6.active { animation:neonScript 3s infinite; }
        @keyframes neonScript {
            0%,19%,21%,23%,25%,54%,56%,100% { text-shadow:0 0 8px #fff,0 0 20px #ff69b4,0 0 50px #ff1493; }
            20%,24%,55% { text-shadow:none; color:rgba(255,255,255,0.4); }
        }
        #l7 { font-family:'Special Elite',cursive; font-size:clamp(28px,4.8vw,58px); color:#f0e6c8; letter-spacing:0.25em; text-transform:uppercase; }
        #l8 { font-family:'Orbitron',sans-serif; font-weight:700; font-size:clamp(34px,5.8vw,66px);
              background:linear-gradient(90deg,#a78bfa,#38bdf8,#f472b6,#a78bfa);
              background-size:300% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        #l8.active { animation:cosmicShift 4s linear infinite; }
        @keyframes cosmicShift { 0%{background-position:0% center} 100%{background-position:300% center} }
        #l9 { font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(40px,6.7vw,76px); color:#f5e6cc; letter-spacing:0.06em; }
        #l10 { font-family:'Great Vibes',cursive; font-size:clamp(52px,8.2vw,98px); color:#d4af7a;
               text-shadow:1px 1px 0 #8B6914,2px 2px 0 #7a5c10,3px 3px 0 #5c4508,4px 4px 8px rgba(0,0,0,0.9); }

        .footer {
            position:fixed; bottom:26px; left:0; right:0;
            text-align:center; font-size:11px; letter-spacing:0.28em;
            color:rgba(255,255,255,0.28); z-index:3;
        }

        @media(max-width: 768px) {
            .logo { width:170px; margin-bottom:20px; }
            .launching-container { height:120px; }
            .content { padding:0 20px 70px; }
        }
        @media(max-width: 560px) {
            .heritage { letter-spacing: 0.4em; white-space: nowrap; }
        }
        @media(max-width: 380px) {
            .launching { white-space: normal; width: 90%; line-height: 1.2; }
            #l1, #l6 { font-size: clamp(40px, 7vw, 70px) !important; }
            .heritage { letter-spacing: 0.2em; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="content">
        <div class="logo">
            <img src="image.png" alt="ROSALEIGH" width="220" height="auto" fetchpriority="high">
        </div>
        <h1 class="brand">ROSALEIGH</h1>
        <p class="heritage">A HERITAGE OF PURITY</p>
        <div class="launching-container">
            <div class="launching active" id="l1">Launching Soon</div>
            <div class="launching" id="l2">Launching Soon</div>
            <div class="launching" id="l3">Launching Soon</div>
            <div class="launching" id="l4">Launching Soon</div>
            <div class="launching" id="l5">Launching Soon</div>
            <div class="launching" id="l6">Launching Soon</div>
            <div class="launching" id="l7">Launching Soon</div>
            <div class="launching" id="l8">Launching Soon</div>
            <div class="launching" id="l9">Launching Soon</div>
            <div class="launching" id="l10">Launching Soon</div>
        </div>
    </div>
    <div class="footer">&copy; 2026 ROSALEIGH &bull; All Rights Reserved.</div>

    <script>
        const items = document.querySelectorAll('.launching');
        const FULL = 'Launching Soon';
        let cur = 0, twTimer = null, blinkInterval = null;

        function typeIt(el) {
            el.textContent = '';
            let i = 0;
            function step() {
                if (!el.classList.contains('active')) return;
                el.textContent = FULL.slice(0, i+1) + (i < FULL.length-1 ? '|' : '');
                i++;
                if (i < FULL.length) { 
                    twTimer = setTimeout(step, 95); 
                } else {
                    let v = true;
                    blinkInterval = setInterval(() => {
                        if (!el.classList.contains('active')) { 
                            clearInterval(blinkInterval);
                            return; 
                        }
                        el.textContent = FULL + (v ? '|' : '');
                        v = !v;
                    }, 480);
                }
            }
            twTimer = setTimeout(step, 80);
        }

        function cycle() {
            items[cur].classList.remove('active');
            if (items[cur].id === 'l7') { 
                if(twTimer){clearTimeout(twTimer); twTimer=null;}
                if(blinkInterval){clearInterval(blinkInterval); blinkInterval=null;}
                items[cur].textContent=''; 
            }
            const nxt = (cur+1) % items.length;
            setTimeout(() => {
                cur = nxt;
                items[cur].classList.add('active');
                if (items[cur].id === 'l7') typeIt(items[cur]);
            }, 620);
        }

        setInterval(cycle, 4000);
    </script>
</body>
</html>
